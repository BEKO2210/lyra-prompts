name: "\U0001F3A8 PromptHero Bild-Prompts importieren"

on:
  schedule:
    - cron: '0 7 * * 1'  # Jeden Montag um 07:00 UTC
  workflow_dispatch:
    inputs:
      max_prompts:
        description: 'Maximale Anzahl (Standard: 50)'
        required: false
        default: '50'
        type: string
      source:
        description: 'Quelle: sdxl, midjourney oder both'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - sdxl
          - midjourney
      dry_run:
        description: 'Nur simulieren, keine Dateien erstellen'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  import-prompthero:
    name: "\U0001F5BC Bild-Prompts laden"
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4C2 Repository auschecken"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "\U0001F40D Python einrichten"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "\U0001F4E6 Abhaengigkeiten installieren"
        run: pip install requests

      - name: "\U0001F680 Import starten"
        env:
          MAX_PROMPTS: ${{ inputs.max_prompts || '50' }}
          PROMPTHERO_SOURCE: ${{ inputs.source || 'both' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/import-prompthero.py

      - name: "\U0001F50D Aenderungen pruefen"
        id: changes
        run: |
          if [ -n "$(git status --porcelain kategorien/ CREDITS.md)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Keine neuen Bild-Prompts — nichts zu committen."
          fi

      - name: "\U0001F4BE Commit und Push"
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kategorien/bildbearbeitung-visualisierung/ CREDITS.md scripts/imported-prompthero.json
          test -f scripts/import-prompthero-log.json && git add scripts/import-prompthero-log.json || true
          IMPORT_COUNT=$(python -c "import json,os; p='scripts/import-prompthero-log.json'; print(json.load(open(p)).get('imported_count',0) if os.path.exists(p) else 0)")
          git commit -m "Import: ${IMPORT_COUNT} neue Bild-Prompts von PromptHero"
          git push
