name: "\U0001F4AC Import: Kommunikation & Beziehungen"

on:
  workflow_dispatch:
    inputs:
      max_prompts:
        description: 'Maximale Anzahl (0 = unbegrenzt)'
        required: false
        default: '0'
        type: string
      dry_run:
        description: 'Nur simulieren'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  import:
    name: "\U0001F4E5 Kommunikation Prompts laden"
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4C2 Repository auschecken"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "\U0001F40D Python einrichten"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "\U0001F4E6 Abhaengigkeiten installieren"
        run: pip install requests

      - name: "\U0001F680 Import starten"
        env:
          MAX_PROMPTS: ${{ inputs.max_prompts || '0' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          CATEGORY_FILTER: kommunikation-beziehungen
        run: python scripts/import-awesome-prompts.py

      - name: "\U0001F50D Aenderungen pruefen"
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: "\U0001F4BE Commit und Push"
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kategorien/kommunikation-beziehungen/ CREDITS.md scripts/imported-prompts.json scripts/import-log.json
          IMPORT_COUNT=$(python -c "import json; d=json.load(open('scripts/import-log.json')); print(d.get('imported_count', 0))")
          git commit -m "Import: ${IMPORT_COUNT} neue Kommunikation Prompts"
          git push
