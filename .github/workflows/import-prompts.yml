name: "\U0001F4E6 Alle Prompts importieren"

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      max_prompts:
        description: 'Maximale Anzahl (0 = unbegrenzt)'
        required: false
        default: '0'
        type: string
      dry_run:
        description: 'Nur simulieren, keine Dateien erstellen'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  import-prompts:
    name: "\U0001F4E5 Prompts laden"
    runs-on: ubuntu-latest
    steps:
      - name: "\U0001F4C2 Repository auschecken"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "\U0001F40D Python einrichten"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "\U0001F4E6 Abhaengigkeiten installieren"
        run: pip install requests

      - name: "\U0001F680 Import starten"
        env:
          MAX_PROMPTS: ${{ inputs.max_prompts || '0' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/import-awesome-prompts.py

      - name: "\U0001F50D Aenderungen pruefen"
        id: changes
        run: |
          # Nur echte Prompt-Dateien zaehlen, nicht Logs
          if git diff --name-only | grep -q '^kategorien/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ -n "$(git status --porcelain kategorien/ CREDITS.md)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Keine neuen Prompts — nichts zu committen."
          fi

      - name: "\U0001F4BE Commit und Push"
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kategorien/ CREDITS.md scripts/imported-prompts.json
          # Log nur stagen wenn vorhanden und aktualisiert
          if [ -f scripts/import-log.json ] && git diff --name-only | grep -q 'scripts/import-log.json'; then
            git add scripts/import-log.json
          fi
          IMPORT_COUNT=$(python -c "
          import json, os
          p = 'scripts/import-log.json'
          if os.path.exists(p):
              d = json.load(open(p))
              print(d.get('imported_count', 0))
          else:
              print(0)
          ")
          git commit -m "Auto-Import: ${IMPORT_COUNT} neue Prompts von awesome-chatgpt-prompts"
          git push
