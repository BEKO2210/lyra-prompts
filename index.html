<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lyra Prompts - Die ultimative AI-Prompt-Datenbank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --primary-glow: rgba(129, 140, 248, 0.15);
            --secondary: #f472b6;
            --bg: #0a0e1a;
            --bg-elevated: #141b2d;
            --bg-card: #141b2d;
            --bg-card-hover: #1c2540;
            --bg-surface: #111827;
            --text: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.08);
            --border-hover: rgba(129, 140, 248, 0.3);
            --success: #34d399;
            --warning: #fbbf24;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 24px rgba(129, 140, 248, 0.12);
            --shadow-glow-pro: 0 0 24px rgba(251, 191, 36, 0.12);
            --glass-bg: rgba(20, 27, 45, 0.7);
            --glass-border: rgba(148, 163, 184, 0.06);
            --transition-fast: 150ms ease;
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
            color-scheme: dark;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --bg-elevated: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --bg-surface: #f1f5f9;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: rgba(15, 23, 42, 0.08);
            --border-hover: rgba(99, 102, 241, 0.3);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 24px rgba(99, 102, 241, 0.08);
            --shadow-glow-pro: 0 0 24px rgba(217, 119, 6, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.04);
            color-scheme: light;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ========================================
           TOP NAVBAR (blur)
           ======================================== */
        .top-navbar {
            position: sticky;
            top: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            transition: background 0.3s ease;
        }

        .navbar-brand {
            font-size: 1.125rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--primary) 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
            -webkit-tap-highlight-color: transparent;
        }

        .theme-toggle:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-glow);
        }

        .theme-toggle:active {
            transform: scale(0.92);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .theme-toggle:hover svg {
            transform: rotate(15deg);
        }

        .theme-icon-dark,
        .theme-icon-light {
            display: none;
        }

        [data-theme="dark"] .theme-icon-dark,
        :root:not([data-theme="light"]) .theme-icon-dark {
            display: block;
        }

        [data-theme="light"] .theme-icon-light {
            display: block;
        }

        [data-theme="light"] .theme-icon-dark {
            display: none;
        }

        /* ========================================
           HEADER
           ======================================== */
        header {
            background: linear-gradient(160deg, #1e1b4b 0%, #312e81 30%, #4338ca 60%, #6366f1 100%);
            padding: 2.5rem 1rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .header-logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.375rem;
            background: linear-gradient(135deg, #fff 0%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.65);
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        /* ========================================
           STATS BAR
           ======================================== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            position: relative;
            transition: background 0.3s ease;
        }

        .stat {
            text-align: center;
            padding: 0.875rem 0.5rem;
            position: relative;
        }

        .stat:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 1px;
            background: var(--border);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        /* ========================================
           SEARCH & FILTERS
           ======================================== */
        .controls {
            padding: 1rem 1rem 0.75rem;
            background: var(--bg);
            transition: background 0.3s ease;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 0.75rem;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        .search-icon svg {
            width: 18px;
            height: 18px;
        }

        .search-box {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            font-size: 0.9375rem;
            font-family: inherit;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-xl);
            background: var(--bg-elevated);
            color: var(--text);
            transition: border-color var(--transition-base), box-shadow var(--transition-base), background var(--transition-base);
            -webkit-appearance: none;
            appearance: none;
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow), var(--shadow-md);
            background: var(--bg-card);
        }

        .filter-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            margin: 0 -1rem;
            padding: 0 1rem;
        }

        .filter-scroll::-webkit-scrollbar {
            display: none;
        }

        .filter-tags {
            display: flex;
            gap: 0.5rem;
            white-space: nowrap;
            padding-bottom: 4px;
        }

        .filter-tag {
            padding: 0.5rem 1rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 100px;
            cursor: pointer;
            transition: all var(--transition-base);
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-shrink: 0;
            -webkit-user-select: none;
            user-select: none;
            min-height: 36px;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .filter-tag:active {
            transform: scale(0.96);
        }

        .filter-tag.active {
            background: linear-gradient(135deg, var(--primary-dark), #7c3aed);
            border-color: transparent;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.35);
        }

        .filter-tag svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* ========================================
           CATEGORIES
           ======================================== */
        .categories {
            padding: 0.75rem 1rem 6rem;
            max-width: 960px;
            margin: 0 auto;
        }

        .category {
            margin-bottom: 0.5rem;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.125rem;
            background: var(--bg-elevated);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            border: 1px solid var(--border);
            -webkit-user-select: none;
            user-select: none;
            min-height: 56px;
        }

        .category.expanded .category-header {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            box-shadow: var(--shadow-sm);
        }

        .category-header:active {
            background: var(--bg-card-hover);
            transform: scale(0.99);
        }

        .category-icon {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            background: var(--primary-glow);
            color: var(--primary);
        }

        .category-icon svg {
            width: 18px;
            height: 18px;
        }

        .category-title {
            flex: 1;
            font-size: 0.9375rem;
            font-weight: 600;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: -0.01em;
        }

        .category-count {
            background: var(--primary-dark);
            color: #fff;
            padding: 0.1875rem 0.625rem;
            border-radius: 100px;
            font-size: 0.6875rem;
            font-weight: 600;
            flex-shrink: 0;
            min-width: 28px;
            text-align: center;
            letter-spacing: 0.02em;
        }

        .category-toggle {
            transition: transform 400ms cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-muted);
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .category-toggle svg {
            width: 16px;
            height: 16px;
        }

        .category.expanded .category-toggle {
            transform: rotate(180deg);
        }

        /* Animated expand/collapse using grid trick */
        .category-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 400ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category.expanded .category-content {
            grid-template-rows: 1fr;
        }

        .category-content-inner {
            overflow: hidden;
        }

        .category.expanded .category-content-inner {
            padding: 0.5rem 0 0.25rem;
        }

        /* Card stagger animation */
        .category.expanded .prompt-card {
            animation: cardReveal 400ms cubic-bezier(0.4, 0, 0.2, 1) backwards;
        }

        .category.expanded .prompt-card:nth-child(1) { animation-delay: 50ms; }
        .category.expanded .prompt-card:nth-child(2) { animation-delay: 100ms; }
        .category.expanded .prompt-card:nth-child(3) { animation-delay: 150ms; }
        .category.expanded .prompt-card:nth-child(4) { animation-delay: 200ms; }
        .category.expanded .prompt-card:nth-child(5) { animation-delay: 250ms; }
        .category.expanded .prompt-card:nth-child(6) { animation-delay: 300ms; }
        .category.expanded .prompt-card:nth-child(n+7) { animation-delay: 350ms; }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ========================================
           PROMPT CARDS
           ======================================== */
        .prompts-grid {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .prompt-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.125rem;
            cursor: pointer;
            transition: transform 250ms cubic-bezier(0.4, 0, 0.2, 1), background 200ms ease, border-color 200ms ease, box-shadow 250ms ease;
            position: relative;
            overflow: hidden;
        }

        .prompt-card:active {
            transform: scale(0.97);
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
        }

        .prompt-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .prompt-card:hover::before {
            opacity: 1;
        }

        .prompt-card.hidden {
            display: none;
        }

        .prompt-title {
            font-size: 0.9375rem;
            font-weight: 600;
            margin-bottom: 0.375rem;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .prompt-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-bottom: 0.5rem;
        }

        .prompt-tag {
            font-size: 0.6875rem;
            padding: 0.1875rem 0.5rem;
            background: var(--primary-glow);
            color: var(--primary);
            border-radius: 100px;
            font-weight: 500;
            white-space: nowrap;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(129, 140, 248, 0.1);
        }

        .prompt-preview {
            color: var(--text-muted);
            font-size: 0.8125rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }

        /* ========================================
           MODAL
           ======================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0);
            z-index: 1000;
            overflow: hidden;
            pointer-events: none;
            transition: background 350ms ease;
            visibility: hidden;
        }

        .modal-overlay.active {
            background: rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            visibility: visible;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 450ms cubic-bezier(0.32, 0.72, 0, 1);
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-handle-area {
            display: flex;
            justify-content: center;
            padding: 0.5rem 0 0;
            flex-shrink: 0;
            background: linear-gradient(160deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
        }

        .modal-handle {
            width: 36px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 100px;
        }

        .modal-header {
            padding: 0.75rem 1rem 1rem;
            background: linear-gradient(160deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
            position: relative;
            flex-shrink: 0;
        }

        .modal-close {
            position: absolute;
            top: 0.5rem;
            right: 0.75rem;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.125rem;
            transition: background var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .modal-close:active {
            background: rgba(255, 255, 255, 0.25);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            padding-right: 2.5rem;
            line-height: 1.3;
            word-break: break-word;
        }

        .modal-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            font-size: 0.8125rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.5rem;
        }

        .modal-meta span {
            white-space: nowrap;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 1rem;
        }

        .section-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin: 1.25rem 0 0.5rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .prompt-block {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 2.75rem 1rem 1rem;
            position: relative;
        }

        .prompt-block pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-word;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.8125rem;
            line-height: 1.65;
            color: var(--text-secondary);
            overflow-x: hidden;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.375rem 0.875rem;
            background: var(--primary-dark);
            border: none;
            border-radius: 100px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            font-family: inherit;
            transition: background 200ms ease, transform 150ms ease, box-shadow 200ms ease;
            min-height: 32px;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .copy-btn:active {
            transform: scale(0.92);
        }

        .copy-btn.copied {
            background: var(--success);
            animation: copyPulse 300ms ease;
        }

        @keyframes copyPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .modal-usage {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.7;
            word-break: break-word;
        }

        .variations-list {
            list-style: none;
        }

        .variations-list li {
            padding: 0.5rem 0;
            padding-left: 1.25rem;
            position: relative;
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.5;
            word-break: break-word;
        }

        .variations-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.875rem;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }

        .modal-tags .prompt-tag {
            font-size: 0.75rem;
            padding: 0.25rem 0.625rem;
        }

        /* ========================================
           FOOTER
           ======================================== */
        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            font-size: 0.8125rem;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        footer .footer-update {
            margin-top: 0.375rem;
            font-size: 0.75rem;
        }

        /* ========================================
           LOADING
           ======================================== */
        .loading {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .categories.loaded {
            animation: contentFadeIn 500ms ease forwards;
        }

        @keyframes contentFadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2.5px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 0.75rem;
        }

        .loading p {
            font-size: 0.875rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========================================
           ERROR STATE
           ======================================== */
        .error-state {
            text-align: center;
            padding: 3rem 1.5rem;
        }

        .error-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        .error-message {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            margin-bottom: 0.5rem;
        }

        .error-detail {
            color: var(--text-muted);
            font-size: 0.8125rem;
        }

        /* ========================================
           BACK TO TOP
           ======================================== */
        .back-to-top {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            background: var(--primary-dark);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity var(--transition-base), transform var(--transition-base), background var(--transition-fast);
            z-index: 50;
            -webkit-tap-highlight-color: transparent;
        }

        .back-to-top svg {
            width: 18px;
            height: 18px;
        }

        .back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .back-to-top:hover {
            background: var(--primary);
        }

        .back-to-top:active {
            transform: scale(0.9);
        }

        /* ========================================
           PRO CATEGORY - PREMIUM STYLING
           ======================================== */
        .category.pro-category .category-header {
            background: linear-gradient(135deg, #1a1520 0%, #2d1f3d 100%);
            border-color: rgba(251, 191, 36, 0.2);
        }

        [data-theme="light"] .category.pro-category .category-header {
            background: linear-gradient(135deg, #fefce8 0%, #fef3c7 100%);
            border-color: rgba(217, 119, 6, 0.2);
        }

        .category.pro-category.expanded .category-header {
            background: linear-gradient(135deg, #2d1f3d 0%, #3d2a50 100%);
            border-color: rgba(251, 191, 36, 0.4);
        }

        [data-theme="light"] .category.pro-category.expanded .category-header {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-color: rgba(217, 119, 6, 0.3);
        }

        .category.pro-category .category-icon {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }

        .category.pro-category .category-count {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .category.pro-category .category-header .category-title {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        [data-theme="light"] .category.pro-category .category-header .category-title {
            background: linear-gradient(135deg, #b45309, #92400e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .category.pro-category .prompt-card {
            border-color: rgba(251, 191, 36, 0.12);
            background: linear-gradient(135deg, #1a1520 0%, #162032 100%);
            position: relative;
        }

        [data-theme="light"] .category.pro-category .prompt-card {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border-color: rgba(217, 119, 6, 0.15);
        }

        .category.pro-category .prompt-card::before {
            background: linear-gradient(90deg, transparent, #fbbf24, transparent);
        }

        .category.pro-category .prompt-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.04), transparent);
            animation: proShimmer 3s infinite;
            pointer-events: none;
        }

        @keyframes proShimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .category.pro-category .prompt-card:active {
            border-color: rgba(251, 191, 36, 0.4);
        }

        .category.pro-category .prompt-tag {
            background: rgba(251, 191, 36, 0.12);
            color: #fbbf24;
        }

        [data-theme="light"] .category.pro-category .prompt-tag {
            background: rgba(217, 119, 6, 0.1);
            color: #b45309;
        }

        .pro-badge {
            font-size: 0.625rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.1875rem 0.5rem;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            border-radius: 100px;
            flex-shrink: 0;
        }

        .pro-lock-overlay {
            display: flex;
            align-items: center;
            color: rgba(251, 191, 36, 0.6);
            flex-shrink: 0;
        }

        .pro-lock-overlay svg {
            width: 16px;
            height: 16px;
        }

        /* ========================================
           PIN POPUP - PREMIUM
           ======================================== */
        .pin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            visibility: hidden;
            transition: background 300ms ease;
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
        }

        .pin-overlay.active {
            background: rgba(0, 0, 0, 0.6);
            pointer-events: auto;
            visibility: visible;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .pin-popup {
            background: linear-gradient(160deg, #1e1b4b 0%, #312e81 100%);
            border-radius: var(--radius-2xl);
            border: 1px solid rgba(251, 191, 36, 0.25);

        }

        .pin-overlay.active .pin-popup {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .pin-popup-icon {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pin-popup-icon svg {
            width: 40px;
            height: 40px;
            color: #fbbf24;
        }

        .pin-popup-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fbbf24;
            margin-bottom: 0.375rem;
            letter-spacing: -0.02em;
        }

        .pin-popup-subtitle {
            font-size: 0.8125rem;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 1.5rem;
        }

        .pin-input-wrapper {
            display: flex;
            gap: 0.625rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .pin-digit {
            width: 52px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: inherit;
            border: 2px solid rgba(251, 191, 36, 0.2);
            border-radius: var(--radius-md);
            background: rgba(0, 0, 0, 0.25);
            color: #fbbf24;
            outline: none;
            transition: border-color 250ms ease, box-shadow 250ms ease, background 250ms ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .pin-digit:focus {
            border-color: #fbbf24;
            box-shadow: 0 0 16px rgba(251, 191, 36, 0.25);
            background: rgba(0, 0, 0, 0.35);
        }

        .pin-digit.filled {
            border-color: rgba(251, 191, 36, 0.5);
        }

        .pin-error {
            color: #f87171;
            font-size: 0.8125rem;
            min-height: 1.25rem;
            margin-bottom: 0.5rem;
            transition: opacity 200ms ease;
        }

        .pin-success {
            color: var(--success);
        }

        .pin-remember {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }

        .pin-remember input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #fbbf24;
            cursor: pointer;
        }

        .pin-remember label {
            font-size: 0.8125rem;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
        }

        .pin-contact {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 1rem;
            line-height: 1.5;
        }

        .pin-contact a {
            color: #fbbf24;
            text-decoration: none;
            font-weight: 500;
        }

        .pin-contact a:hover {
            text-decoration: underline;
        }

        .pin-popup-close {
            position: absolute;
            top: 0.875rem;
            right: 0.875rem;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: rgba(255, 255, 255, 0.4);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast);
        }

        .pin-popup-close:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .pin-popup-close svg {
            width: 16px;
            height: 16px;
        }

        @keyframes pinShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-7px); }
            80% { transform: translateX(7px); }
        }

        @keyframes pinSuccess {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 0 50px rgba(52, 211, 153, 0.25); }
            100% { transform: scale(1); }
        }

        .pin-popup.shake {
            animation: pinShake 400ms ease;
        }

        .pin-popup.success {
            animation: pinSuccess 500ms ease;
            border-color: var(--success);
        }

        /* ========================================
           EMPTY STATE
           ======================================== */
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* ========================================
           RESPONSIVE - TABLET & DESKTOP
           ======================================== */
        @media (min-width: 640px) {
            header {
                padding: 2.5rem 2rem 2rem;
            }

            .header-logo {
                font-size: 2.25rem;
            }

            .header-subtitle {
                font-size: 1rem;
            }

            .stat-value {
                font-size: 1.75rem;
            }

            .stat-label {
                font-size: 0.75rem;
            }

            .controls {
                padding: 1rem 1.5rem;
                max-width: 960px;
                margin-left: auto;
                margin-right: auto;
            }

            .categories {
                padding: 1rem 1.5rem 4rem;
            }

            .prompts-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 0.625rem;
            }

            .prompt-title {
                white-space: normal;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
            }
        }

        @media (min-width: 1024px) {
            header {
                padding: 3rem 2rem 2.5rem;
            }

            header::before {
                width: 500px;
                height: 500px;
            }

            .header-logo {
                font-size: 2.75rem;
            }

            .header-subtitle {
                font-size: 1.125rem;
            }

            .controls {
                padding: 1.25rem 2rem;
            }

            .categories {
                padding: 1.25rem 2rem 4rem;
            }

            .prompts-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .prompt-card:hover {
                transform: translateY(-3px);
                border-color: var(--border-hover);
                box-shadow: var(--shadow-glow), var(--shadow-md);
            }

            .category.pro-category .prompt-card:hover {
                box-shadow: var(--shadow-glow-pro), var(--shadow-md);
                border-color: rgba(251, 191, 36, 0.3);
            }

            .category-header:hover {
                background: var(--bg-card-hover);
                box-shadow: var(--shadow-sm);
            }

            .filter-tag:hover:not(.active) {
                background: var(--bg-card-hover);
                border-color: var(--border-hover);
                transform: translateY(-1px);
            }

            /* Desktop modal: centered card instead of fullscreen */
            .modal {
                position: fixed;
                top: 50%;
                left: 50%;
                right: auto;
                bottom: auto;
                transform: translate(-50%, -45%) scale(0.92);
                max-width: 680px;
                width: calc(100% - 3rem);
                max-height: 85vh;
                border-radius: var(--radius-2xl);
                border: 1px solid var(--border);
                overflow: hidden;
                opacity: 0;
                transition: transform 400ms cubic-bezier(0.32, 0.72, 0, 1), opacity 300ms ease;
                box-shadow: var(--shadow-lg);
            }

            .modal-overlay.active .modal {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            .modal-handle-area {
                display: none;
            }

            .modal-header {
                border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
            }

            .modal-close:hover {
                background: rgba(255, 255, 255, 0.25);
            }

            .copy-btn:hover {
                background: var(--primary);
            }
        }

        /* ========================================
           LIGHT THEME ADJUSTMENTS
           ======================================== */
        [data-theme="light"] header {
            background: linear-gradient(160deg, #4338ca 0%, #6366f1 40%, #818cf8 70%, #a5b4fc 100%);
        }

        [data-theme="light"] .top-navbar {
            background: rgba(255, 255, 255, 0.8);
        }

        [data-theme="light"] .modal-handle-area,
        [data-theme="light"] .modal-header {
            background: linear-gradient(160deg, #4338ca 0%, #6366f1 50%, #818cf8 100%);
        }

        [data-theme="light"] .prompt-block {
            background: #f1f5f9;
            border-color: rgba(0, 0, 0, 0.06);
        }

        [data-theme="light"] .prompt-block pre {
            color: #334155;
        }

        [data-theme="light"] .category-icon {
            background: rgba(99, 102, 241, 0.08);
        }

        [data-theme="light"] .stats-bar {
            background: #fff;
        }

        /* ========================================
           NO-MOTION PREFERENCE
           ======================================== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

        };

        // Keep text-only fallback (no emojis)
        const categoryIcons = {
            'alltag-leben': '',
            'beruf-karriere': '',
            'lernen-wachstum': '',
            'kommunikation-beziehungen': '',
            'kreativitaet-freizeit': '',
            'gesundheit-wohlbefinden': '',
            'technik-alltag': '',
            'spezielle-situationen': '',
            'bildbearbeitung-visualisierung': '',

        };

        const categoryNames = {
            'alltag-leben': 'Alltag & Leben',
            'beruf-karriere': 'Beruf & Karriere',
            'lernen-wachstum': 'Lernen & Wachstum',
            'kommunikation-beziehungen': 'Kommunikation & Beziehungen',
            'kreativitaet-freizeit': 'Kreativit\u00E4t & Freizeit',
            'gesundheit-wohlbefinden': 'Gesundheit & Wohlbefinden',
            'technik-alltag': 'Technik & Alltag',
            'spezielle-situationen': 'Spezielle Situationen',
            'bildbearbeitung-visualisierung': 'Bildbearbeitung & KI-Visualisierung',
            'pro': 'Pro'
        };

        // Pro category PIN
        const PRO_PIN = '1518';
        var proUnlocked = localStorage.getItem('lyra_pro_unlocked') === 'true';
        var pendingProAction = null; // stores {type, categoryKey, index} for after PIN verify

        // Parse Markdown frontmatter and content
        function parseMarkdown(content) {
            const frontmatter = {};
            const frontmatterMatch = content.match(/^---\n([\s\S]*?)\n---/);

            if (frontmatterMatch) {
                frontmatterMatch[1].split('\n').forEach(function(line) {
                    const match = line.match(/^([^:]+):\s*(.+)$/);
                    if (match) {
                        const key = match[1].trim();
                        let value = match[2].trim();
                        if (value.startsWith('[') && value.endsWith(']')) {
                            value = value.slice(1, -1).split(',').map(function(v) { return v.trim(); });
                        }
                        frontmatter[key] = value;
                    }
                });
            }

            const body = content.replace(/^---\n[\s\S]*?\n---/, '').trim();

            // Try with triple-backtick code block first, then fallback to bare text
            var promptMatch = body.match(/## Prompt\s*\n\n```[\s\S]*?\n([\s\S]*?)```/);
            if (!promptMatch) {
                // Fallback: capture everything between ## Prompt and the next ## heading
                promptMatch = body.match(/## Prompt\s*\n\n([\s\S]*?)(?=\n## |\n---\s*$|$)/);
            }
            const prompt = promptMatch ? promptMatch[1].trim() : '';

            // Support both "## Anwendung" and "## Beispiel" section names
            var usageMatch = body.match(/## Anwendung\s*\n\n([\s\S]*?)(?=\n## |$)/);
            if (!usageMatch) {
                usageMatch = body.match(/## Beispiel\s*\n\n([\s\S]*?)(?=\n## |$)/);
            }
            const usage = usageMatch ? usageMatch[1].trim() : '';

            const variationsMatch = body.match(/## Variationen\s*\n\n([\s\S]*?)(?=\n## |$)/);
            const variationsText = variationsMatch ? variationsMatch[1].trim() : '';
            const variations = variationsText.split('\n').filter(function(v) { return v.trim().startsWith('-'); }).map(function(v) { return v.replace(/^-\s*/, ''); });

            return { frontmatter: frontmatter, prompt: prompt, usage: usage, variations: variations };
        }

        // Load prompts using minimal API calls
        // 1 API call for the file tree + raw.githubusercontent.com for content (no rate limit)
        async function loadPrompts() {
            try {
                // Single API call to get entire repository tree
                const treeResponse = await fetch(
                    'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/git/trees/master?recursive=1'
                );
                if (!treeResponse.ok) throw new Error('API-Fehler: ' + treeResponse.status);
                const treeData = await treeResponse.json();

                // Filter for .md files inside kategorien/
                const mdFiles = treeData.tree.filter(function(item) {
                    return item.type === 'blob' &&
                           item.path.startsWith(CATEGORIES_PATH + '/') &&
                           item.path.endsWith('.md');
                });

                // Extract unique category folder names
                var categoryKeys = {};
                mdFiles.forEach(function(file) {
                    var parts = file.path.split('/');
                    if (parts.length >= 3) {
                        categoryKeys[parts[1]] = true;
                    }
                });

                // Initialize category objects
                Object.keys(categoryKeys).forEach(function(key) {
                    categories[key] = {
                        name: categoryNames[key] || key,
                        icon: categoryIcons[key] || '\u{1F4C1}',
                        prompts: []
                    };
                });

                // Fetch all markdown files via raw.githubusercontent.com (no API rate limit)
                var RAW_BASE = 'https://raw.githubusercontent.com/' + REPO_OWNER + '/' + REPO_NAME + '/master/';

                var filePromises = mdFiles.map(async function(file) {
                    try {
                        var contentResponse = await fetch(RAW_BASE + file.path);
                        if (!contentResponse.ok) return;
                        var content = await contentResponse.text();
                        var parsed = parseMarkdown(content);

                        var parts = file.path.split('/');
                        var categoryKey = parts[1];
                        var filename = parts[parts.length - 1];

                        var promptData = {};
                        Object.keys(parsed.frontmatter).forEach(function(k) { promptData[k] = parsed.frontmatter[k]; });
                        promptData.prompt = parsed.prompt;
                        promptData.usage = parsed.usage;
                        promptData.variations = parsed.variations;
                        promptData.category = categoryKey;
                        promptData.categoryName = categoryNames[categoryKey];
                        promptData.filename = filename;

                        allPrompts.push(promptData);
                        if (categories[categoryKey]) {
                            categories[categoryKey].prompts.push(promptData);
                        }
                    } catch (e) {
                        console.warn('Fehler bei Datei: ' + file.path, e);
                    }
                });

                await Promise.all(filePromises);
                render();
            } catch (error) {
                console.error('Fehler beim Laden:', error);
                document.getElementById('categories').innerHTML =
                    '<div class="error-state">' +
                    '<div class="error-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>' +
                    '<p class="error-message">Fehler beim Laden der Prompts</p>' +
                    '<p class="error-detail">' + escapeHtml(error.message) + '</p>' +
                    '</div>';
            }
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Render all categories and prompts
        function render() {
            animateCount(document.getElementById('total-prompts'), allPrompts.length);
            animateCount(document.getElementById('total-categories'), Object.keys(categories).length);
            animateCount(document.getElementById('image-prompts'), (categories['bildbearbeitung-visualisierung'] && categories['bildbearbeitung-visualisierung'].prompts.length) || 0);
            document.getElementById('last-update').textContent = new Date().toLocaleDateString('de-DE');

            // Build filter tags (with SVG icons, no emojis)
            var filterContainer = document.getElementById('filter-tags');
            Object.keys(categories).forEach(function(key) {
                var tag = document.createElement('span');
                tag.className = 'filter-tag';
                tag.dataset.filter = key;
                var svgIcon = categoryIconsSVG[key] || '';
                tag.innerHTML = svgIcon + ' ' + escapeHtml(categories[key].name);
                tag.onclick = function() { filterByCategory(key); };
                filterContainer.appendChild(tag);
            });

            // Render categories
            var container = document.getElementById('categories');
            container.innerHTML = '';
            container.classList.add('loaded');

            // Sort categories alphabetically by display name, pro always last
            var sortedKeys = Object.keys(categories).sort(function(a, b) {
                if (a === 'pro') return 1;
                if (b === 'pro') return -1;
                return categories[a].name.localeCompare(categories[b].name, 'de');
            });

            sortedKeys.forEach(function(key) {
                var category = categories[key];
                var isPro = key === 'pro';
                var categoryEl = document.createElement('div');
                categoryEl.className = 'category' + (isPro ? ' pro-category' : '');
                categoryEl.dataset.category = key;

                var cardsHtml = category.prompts.map(function(prompt, index) {
                    var title = prompt.titel || 'Unbenannt';
                    var tags = (prompt.tags || []).slice(0, 3).map(function(tag) {
                        return '<span class="prompt-tag">' + escapeHtml(tag) + '</span>';
                    }).join('');
                    var preview = prompt.usage || (prompt.prompt ? prompt.prompt.substring(0, 100) + '...' : '');

                    return '<div class="prompt-card" onclick="openModal(\'' + key + '\',' + index + ')" data-title="' + escapeHtml((prompt.titel || '').toLowerCase()) + '" data-tags="' + escapeHtml((prompt.tags || []).join(' ').toLowerCase()) + '">' +
                        '<div class="prompt-title">' + escapeHtml(title) + '</div>' +
                        '<div class="prompt-meta">' + tags + '</div>' +
                        '<div class="prompt-preview">' + escapeHtml(preview) + '</div>' +
                        '</div>';
                }).join('');

                var svgIcon = categoryIconsSVG[key] || '';
                var proBadge = isPro ? '<span class="pro-badge">PRO</span>' : '';
                var lockOverlay = (isPro && !proUnlocked) ? '<span class="pro-lock-overlay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>' : '';
                var chevronSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

                categoryEl.innerHTML =
                    '<div class="category-header" onclick="toggleCategory(\'' + key + '\')">' +
                    '<span class="category-icon">' + svgIcon + '</span>' +
                    '<span class="category-title">' + escapeHtml(category.name) + '</span>' +
                    proBadge +
                    lockOverlay +
                    '<span class="category-count">' + category.prompts.length + '</span>' +
                    '<span class="category-toggle">' + chevronSVG + '</span>' +
                    '</div>' +
                    '<div class="category-content">' +
                    '<div class="category-content-inner">' +
                    '<div class="prompts-grid">' + cardsHtml + '</div>' +
                    '</div>' +
                    '</div>';

                container.appendChild(categoryEl);
            });
        }

        // Toggle category open/close
        function toggleCategory(key) {
            var category = document.querySelector('[data-category="' + key + '"]');
            if (!category) return;

            // PIN check for pro category - ALL entry points
            if (key === 'pro' && !proUnlocked && !category.classList.contains('expanded')) {
                pendingProAction = { type: 'toggle', categoryKey: key };
                openPinPopup();
                return;
            }

            category.classList.toggle('expanded');
        }

        // Filter by category
        function filterByCategory(key) {
            // Pro PIN gate for filter navigation
            if (key === 'pro' && !proUnlocked) {
                pendingProAction = { type: 'filter', categoryKey: key };
                openPinPopup();
                return;
            }

            document.querySelectorAll('.filter-tag').forEach(function(tag) {
                tag.classList.toggle('active', tag.dataset.filter === key);
            });

            document.querySelectorAll('.category').forEach(function(cat) {
                if (key === 'all' || cat.dataset.category === key) {
                    cat.style.display = '';
                    if (key !== 'all') cat.classList.add('expanded');
                } else {
                    cat.style.display = 'none';
                }
            });
        }

        // Search functionality
        document.getElementById('search').addEventListener('input', function(e) {
            var query = e.target.value.toLowerCase().trim();

            if (!query) {
                // Reset: show all cards and categories
                document.querySelectorAll('.prompt-card').forEach(function(card) {
                    card.classList.remove('hidden');
                });
                document.querySelectorAll('.category').forEach(function(cat) {
                    cat.style.display = '';
                });
                return;
            }

            document.querySelectorAll('.prompt-card').forEach(function(card) {
                var title = card.dataset.title || '';
                var tags = card.dataset.tags || '';
                var matches = title.indexOf(query) !== -1 || tags.indexOf(query) !== -1;
                card.classList.toggle('hidden', !matches);
            });

            // Hide empty categories, expand those with results
            document.querySelectorAll('.category').forEach(function(cat) {
                var visibleCards = cat.querySelectorAll('.prompt-card:not(.hidden)');
                if (visibleCards.length > 0) {
                    cat.style.display = '';
                    cat.classList.add('expanded');
                } else {
                    cat.style.display = 'none';
                }
            });
        });

        // Centralized Pro content gate - ALL entry points go through here
        function openProContent(categoryKey, index) {
            if (categoryKey === 'pro' && !proUnlocked) {
                pendingProAction = { type: 'openModal', categoryKey: categoryKey, index: index };
                openPinPopup();
                return false;
            }
            return true;
        }

        // Open modal
        function openModal(categoryKey, index) {
            // Pro PIN gate: check ALL Pro content access
            if (categoryKey === 'pro' && !proUnlocked) {
                openProContent(categoryKey, index);
                return;
            }

            var prompt = categories[categoryKey].prompts[index];
            if (!prompt) return;

            document.getElementById('modal-title').textContent = prompt.titel || 'Unbenannt';

            var metaHtml =
                '<span>' + escapeHtml(categoryNames[categoryKey] || '') + '</span>' +
                '<span>\u00B7</span>' +
                '<span>' + escapeHtml(prompt.unterkategorie || 'Allgemein') + '</span>';
            if (prompt.plattformen) {
                metaHtml += '<span>\u00B7</span><span>' + escapeHtml(prompt.plattformen.join(', ')) + '</span>';
            }
            document.getElementById('modal-meta').innerHTML = metaHtml;

            var bodyHtml = '<div class="section-title">Prompt</div>' +
                '<div class="prompt-block">' +
                '<button class="copy-btn" onclick="copyPrompt(this)">Kopieren</button>' +
                '<pre>' + escapeHtml(prompt.prompt) + '</pre>' +
                '</div>';

            if (prompt.usage) {
                bodyHtml += '<div class="section-title">Anwendung</div>' +
                    '<p class="modal-usage">' + escapeHtml(prompt.usage).replace(/\n/g, '<br>') + '</p>';
            }

            if (prompt.variations && prompt.variations.length > 0) {
                bodyHtml += '<div class="section-title">Variationen</div>' +
                    '<ul class="variations-list">' +
                    prompt.variations.map(function(v) { return '<li>' + escapeHtml(v) + '</li>'; }).join('') +
                    '</ul>';
            }

            if (prompt.tags && prompt.tags.length > 0) {
                bodyHtml += '<div class="section-title">Tags</div>' +
                    '<div class="modal-tags">' +
                    prompt.tags.map(function(tag) { return '<span class="prompt-tag">' + escapeHtml(tag) + '</span>'; }).join('') +
                    '</div>';
            }

            document.getElementById('modal-body').innerHTML = bodyHtml;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Copy prompt to clipboard
        function copyPrompt(btn) {
            var text = btn.nextElementSibling.textContent;
            navigator.clipboard.writeText(text).then(function() {
                btn.textContent = 'Kopiert!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = 'Kopieren';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(function() {
                // Fallback for older browsers
                var textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = 'Kopiert!';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = 'Kopieren';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Close modal on overlay click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target.id === 'modal') closeModal();
        });

        // ESC to close modals
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.getElementById('pinOverlay').classList.contains('active')) {
                    closePinPopup();
                } else {
                    closeModal();
                }
            }
        });

        // Back-to-top button visibility
        var backToTopBtn = document.getElementById('backToTop');
        var scrollTimeout;
        window.addEventListener('scroll', function() {
            if (scrollTimeout) cancelAnimationFrame(scrollTimeout);
            scrollTimeout = requestAnimationFrame(function() {
                backToTopBtn.classList.toggle('visible', window.scrollY > 400);
            });
        }, { passive: true });

        // ========================================
        // PIN POPUP LOGIC
        // ========================================
        function openPinPopup() {
            var overlay = document.getElementById('pinOverlay');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            document.getElementById('pinError').textContent = '';
            // Clear and focus first digit
            var digits = document.querySelectorAll('.pin-digit');
            digits.forEach(function(d) { d.value = ''; d.classList.remove('filled'); });
            setTimeout(function() { digits[0].focus(); }, 300);
        }

        function closePinPopup() {
            var overlay = document.getElementById('pinOverlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            var popup = document.getElementById('pinPopup');
            popup.classList.remove('shake', 'success');
        }

        // PIN digit inputs: auto-advance + auto-verify
        (function() {
            var digits = document.querySelectorAll('.pin-digit');

            digits.forEach(function(input, index) {
                input.addEventListener('input', function(e) {
                    var val = e.target.value.replace(/[^0-9]/g, '');
                    e.target.value = val.slice(0, 1);

                    if (val.length > 0) {
                        e.target.classList.add('filled');
                        // Auto-advance to next digit
                        if (index < digits.length - 1) {
                            digits[index + 1].focus();
                        }
                    }

                    // Check if all 4 digits are filled
                    var pin = '';
                    digits.forEach(function(d) { pin += d.value; });
                    if (pin.length === 4) {
                        verifyPin(pin);
                    }
                });

                input.addEventListener('keydown', function(e) {
                    // Backspace: clear current and go back
                    if (e.key === 'Backspace') {
                        if (e.target.value === '' && index > 0) {
                            digits[index - 1].value = '';
                            digits[index - 1].classList.remove('filled');
                            digits[index - 1].focus();
                        } else {
                            e.target.classList.remove('filled');
                        }
                    }
                });

                // Select all on focus for easy overwrite
                input.addEventListener('focus', function() {
                    var self = this;
                    setTimeout(function() { self.select(); }, 10);
                });
            });
        })();

        function verifyPin(pin) {
            var popup = document.getElementById('pinPopup');
            var errorEl = document.getElementById('pinError');

            if (pin === PRO_PIN) {
                // Success
                proUnlocked = true;

                // Remember PIN if checkbox is checked
                var rememberCheckbox = document.getElementById('pinRemember');
                if (rememberCheckbox && rememberCheckbox.checked) {
                    localStorage.setItem('lyra_pro_unlocked', 'true');
                }

                popup.classList.remove('shake');
                popup.classList.add('success');
                errorEl.innerHTML = '<svg style="display:inline;width:14px;height:14px;vertical-align:-2px;margin-right:4px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Zugang freigeschaltet!';
                errorEl.className = 'pin-error pin-success';

                // Remove lock overlay
                var lockOverlay = document.querySelector('.pro-category .pro-lock-overlay');
                if (lockOverlay) lockOverlay.style.display = 'none';

                setTimeout(function() {
                    closePinPopup();

                    // Execute pending action
                    if (pendingProAction) {
                        var action = pendingProAction;
                        pendingProAction = null;

                        if (action.type === 'openModal') {
                            openModal(action.categoryKey, action.index);
                        } else if (action.type === 'filter') {
                            filterByCategory(action.categoryKey);
                        } else if (action.type === 'toggle') {
                            var proCat = document.querySelector('[data-category="pro"]');
                            if (proCat) proCat.classList.add('expanded');
                        }
                    } else {
                        // Default: open pro category
                        var proCat = document.querySelector('[data-category="pro"]');
                        if (proCat) proCat.classList.add('expanded');
                    }
                }, 600);
            } else {
                // Wrong PIN
                popup.classList.remove('shake');
                void popup.offsetWidth; // Force reflow for re-animation
                popup.classList.add('shake');
                errorEl.textContent = 'Falscher PIN. Versuche es erneut.';
                errorEl.className = 'pin-error';

                // Clear digits after shake
                setTimeout(function() {
                    var digits = document.querySelectorAll('.pin-digit');
                    digits.forEach(function(d) { d.value = ''; d.classList.remove('filled'); });
                    digits[0].focus();
                }, 500);
            }
        }

        // Close PIN popup on overlay click
        document.getElementById('pinOverlay').addEventListener('click', function(e) {
            if (e.target.id === 'pinOverlay') closePinPopup();
        });

        // Animated count-up for stat values
        function animateCount(el, target) {
            var start = 0;
            var duration = 600;
            var startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                var progress = Math.min((timestamp - startTime) / duration, 1);
                var eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic
                el.textContent = Math.round(eased * target);
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        // ========================================
        // THEME TOGGLE
        // ========================================
        (function() {
            var themeToggle = document.getElementById('themeToggle');
            var html = document.documentElement;

            // Initialize theme from localStorage or system preference
            var savedTheme = localStorage.getItem('lyra_theme');
            if (savedTheme) {
                html.setAttribute('data-theme', savedTheme);
            } else {
                // Check system preference
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                html.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }

            // Update meta theme-color
            function updateMetaTheme() {
                var isDark = html.getAttribute('data-theme') !== 'light';
                var meta = document.querySelector('meta[name="theme-color"]');
                if (meta) meta.content = isDark ? '#0a0e1a' : '#f8fafc';
            }
            updateMetaTheme();

            themeToggle.addEventListener('click', function() {
                var current = html.getAttribute('data-theme');
                var next = current === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', next);
                localStorage.setItem('lyra_theme', next);
                updateMetaTheme();
            });

            // Listen for system theme changes
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                if (!localStorage.getItem('lyra_theme')) {
                    html.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                    updateMetaTheme();
                }
            });
        })();

        // Load
        loadPrompts();
    </script>
</body>
</html>
