<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lyra Pro — Key Generator (NUR LOKAL)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#e5e5e5;min-height:100vh;padding:2rem;}
  .wrap{max-width:700px;margin:0 auto;}
  h1{font-size:1.5rem;color:#f59e0b;margin-bottom:.25rem;}
  .warn{background:#7f1d1d;border:1px solid #dc2626;border-radius:8px;padding:1rem;margin:1rem 0;font-size:.85rem;color:#fca5a5;}
  .controls{display:flex;gap:1rem;align-items:center;margin:1.5rem 0;}
  label{font-size:.85rem;color:#a3a3a3;}
  input[type=number]{width:80px;padding:.5rem;border:1px solid #333;border-radius:6px;background:#1a1a1a;color:#e5e5e5;font-size:1rem;text-align:center;}
  button{padding:.6rem 1.5rem;border:none;border-radius:6px;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s;}
  button:hover{opacity:.85;}
  .btn-gen{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;}
  .btn-copy{background:#262626;color:#e5e5e5;border:1px solid #404040;font-size:.8rem;padding:.4rem .8rem;}
  .result{margin-top:1.5rem;}
  .key-row{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;background:#141414;border:1px solid #262626;border-radius:6px;margin-bottom:.5rem;font-family:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;}
  .key-val{font-size:.95rem;color:#f59e0b;flex:1;}
  .hash-val{font-size:.65rem;color:#737373;word-break:break-all;}
  .section-title{font-size:.8rem;color:#a3a3a3;text-transform:uppercase;letter-spacing:.08em;margin:1.5rem 0 .75rem;border-bottom:1px solid #262626;padding-bottom:.5rem;}
  .hash-block{background:#141414;border:1px solid #262626;border-radius:6px;padding:1rem;font-family:monospace;font-size:.75rem;color:#a3a3a3;white-space:pre-wrap;word-break:break-all;position:relative;}
  .hash-block button{position:absolute;top:.5rem;right:.5rem;}
  .info{font-size:.8rem;color:#737373;margin-top:1rem;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Lyra Pro — Key Generator</h1>
  <div class="warn">
    <strong>NUR FUER DICH!</strong> Diese Datei darf NICHT ins Repository oder online gestellt werden.
    Sie ist in .gitignore eingetragen.
  </div>

  <div class="controls">
    <label>Anzahl Keys: <input type="number" id="count" value="5" min="1" max="50"></label>
    <button class="btn-gen" onclick="generateKeys()">Keys generieren</button>
  </div>

  <div id="result" class="result"></div>
</div>

<script>
function randomSegment() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; /* ohne I,O,0,1 zur Vermeidung von Verwechslung */
  let s = '';
  for (let i = 0; i < 4; i++) {
    s += chars[Math.floor(Math.random() * chars.length)];
  }
  return s;
}

function generateKey() {
  return 'LYRA-' + randomSegment() + '-' + randomSegment() + '-' + randomSegment();
}

async function sha256(text) {
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function generateKeys() {
  const count = Math.min(50, Math.max(1, parseInt(document.getElementById('count').value) || 5));
  const keys = [];
  for (let i = 0; i < count; i++) {
    const key = generateKey();
    const hash = await sha256(key);
    keys.push({ key, hash });
  }

  let keysHtml = '<div class="section-title">Generierte Keys (an Kunden weitergeben)</div>';
  const keyList = [];
  const hashList = [];

  for (const { key, hash } of keys) {
    keyList.push(key);
    hashList.push("  '" + hash + "'");
    keysHtml += `
      <div class="key-row">
        <span class="key-val">${key}</span>
        <button class="btn-copy" onclick="navigator.clipboard.writeText('${key}');this.textContent='Kopiert!'">Kopieren</button>
      </div>
      <div style="padding:0 .75rem .5rem;"><span class="hash-val">Hash: ${hash}</span></div>
    `;
  }

  keysHtml += '<div class="section-title">Zum Einfuegen in index.html (VALID_KEY_HASHES Array)</div>';
  const arrayContent = 'const VALID_KEY_HASHES = [\n' + hashList.join(',\n') + '\n];';
  keysHtml += `
    <div class="hash-block">
      <button class="btn-copy" onclick="navigator.clipboard.writeText(document.getElementById('hashCode').textContent);this.textContent='Kopiert!'">Kopieren</button>
      <code id="hashCode">${arrayContent}</code>
    </div>
  `;

  keysHtml += `
    <div class="info">
      <strong>Anleitung:</strong><br>
      1. Kopiere die Hashes oben<br>
      2. Oeffne <code>index.html</code> und finde das <code>VALID_KEY_HASHES</code> Array<br>
      3. Fuege die neuen Hashes hinzu (bestehende NICHT loeschen!)<br>
      4. Committe und pushe<br>
      5. Gib die Keys (LYRA-XXXX-...) an deine Kunden weiter
    </div>
  `;

  document.getElementById('result').innerHTML = keysHtml;
}
</script>
</body>
</html>
